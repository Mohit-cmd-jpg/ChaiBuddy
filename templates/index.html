<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChaiBuddy - AI Chat Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- We use Inter to closely emulate the sleek geometric feeling of Söhne -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="dark"> <!-- Defaulting to Dark Mode like modern ChatGPT -->
    <div class="main-container">
        
        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" id="newChat">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    <span>New chat</span>
                </button>
                <div class="sidebar-actions">
                    <button class="icon-btn search-toggle" title="Search">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                    </button>
                    <!-- Small toggle for mobile sidebar -->
                    <button class="icon-btn sidebar-close hidden-desktop" id="closeSidebar">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M18 6L6 18M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="sidebar-content">
                <div class="search-box hidden" id="searchBoxContainer">
                    <input type="text" id="chatSearch" placeholder="Search chats..." />
                </div>
                <!-- Chat history list -->
                <div class="chat-list-container">
                    <div id="chatList" class="chat-list"></div>
                </div>
            </div>

            <!-- Profile / Settings Footer -->
            <div class="sidebar-footer">
                <button class="nav-btn theme-toggle" id="themeToggle" title="Toggle Theme">
                    <div class="btn-left">
                        <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                        <svg class="moon-icon hidden" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                        <span class="theme-text">Light mode</span>
                    </div>
                </button>
            </div>
        </aside>

        <!-- MAIN CHAT AREA -->
        <main class="chat-container">
            <!-- Mobile Header for Sidebar Toggle -->
            <header class="mobile-header hidden-desktop">
                <button class="icon-btn" id="openSidebar">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <div class="mobile-title">ChaiBuddy</div>
                <button class="icon-btn" id="mobileNewChat">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                       <path d="M12 5v14M5 12h14"></path>
                    </svg>
                </button>
            </header>

            <!-- Scrollable Messages Area -->
            <div id="messagesContainer" class="messages-container">
                
                <!-- EMPTY STATE (ChatGPT style layout) -->
                <div id="emptyState" class="empty-state">
                    <div class="empty-content">
                        <div class="logo">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M2 13.5A2.5 2.5 0 004.5 16H6v2a2 2 0 002 2h4a2 2 0 002-2v-2h1.5a2.5 2.5 0 002.5-2.5V8A2.5 2.5 0 0015.5 5.5H8v-2A2.5 2.5 0 005.5 1h-2A2.5 2.5 0 001 3.5V8a2 2 0 002 2v3.5z"/>
                                <circle cx="12" cy="12" r="10" />
                                <path d="M8 12c.5-1 2-2 4-2s3.5 1 4 2" />
                            </svg>
                        </div>
                        <h2>How can I help you today?</h2>
                        
                        <div class="suggested-prompts-grid">
                            <button class="suggestion-btn" data-prompt="Help me brainstorm ideas for a new project">
                                <span class="suggestion-title">Brainstorm ideas</span>
                                <span class="suggestion-desc">for a new project</span>
                            </button>
                            <button class="suggestion-btn" data-prompt="Explain quantum computing in simple terms">
                                <span class="suggestion-title">Explain quantum computing</span>
                                <span class="suggestion-desc">in simple terms</span>
                            </button>
                            <button class="suggestion-btn" data-prompt="What are some productivity tips?">
                                <span class="suggestion-title">Productivity tips</span>
                                <span class="suggestion-desc">to get more done efficiently</span>
                            </button>
                            <button class="suggestion-btn" data-prompt="Write me a short story about adventure">
                                <span class="suggestion-title">Write a short story</span>
                                <span class="suggestion-desc">about an epic adventure</span>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- MESSAGES -->
                <div id="messagesList" class="messages-list hidden"></div>

                <!-- TYPING INDICATOR -->
                <div id="typingIndicator" class="typing-indicator hidden">
                    <div class="typing-wrapper">
                        <div class="bot-avatar">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/>
                            </svg>
                        </div>
                        <div class="typing-dots">
                            <span class="typing-dot"></span>
                            <span class="typing-dot"></span>
                            <span class="typing-dot"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- FIXED BOTTOM INPUT AREA -->
            <div class="input-area-bound">
                <div class="input-area">
                    <div class="input-wrapper">
                        <textarea 
                            id="input" 
                            class="message-input" 
                            placeholder="Message ChaiBuddy..." 
                            rows="1"
                        ></textarea>
                        <button id="sendBtn" class="send-btn" title="Send message (Enter)">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="submit-arrow" stroke="currentColor">
                                <path fill="currentColor" fill-rule="evenodd" d="M12 4.414L3.707 12.707a1 1 0 01-1.414-1.414l9-9a1 1 0 011.414 0l9 9a1 1 0 01-1.414 1.414L12 4.414z" clip-rule="evenodd"></path>
                            </svg>
                        </button>
                    </div>
                    <p class="input-hint">ChaiBuddy can make mistakes. Consider verifying important information.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- MESSAGE MENU (context menu) -->
    <div id="messageMenu" class="message-menu hidden">
        <button class="menu-item" data-action="copy">Copy</button>
        <button class="menu-item" data-action="delete">Delete</button>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
