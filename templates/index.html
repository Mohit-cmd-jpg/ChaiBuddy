<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChaiBuddy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

    <!-- TOP NAV BAR -->
    <header class="topbar">
        <div class="brand">
            🫖 ChaiBuddy
        </div>

        <div class="theme-toggle">
            <span id="themeIcon">🌙</span>
        </div>
    </header>

    <!-- MAIN LAYOUT -->
    <div class="container">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <button id="newChat" class="new-chat-btn">+ New Chat</button>
            <div id="chatList" class="chat-list"></div>
        </aside>

        <!-- CHAT AREA -->
        <main class="chat-area">

            <div id="landing" class="landing">
                <div class="landing-inner">
                    <div class="landing-icon">🫖</div>
                    <h1>Welcome to ChaiBuddy</h1>
                    <p>Your cozy AI companion for chats, ideas, and late-night thoughts.</p>
                    <div class="landing-actions">
                        <button id="landingNewChat" class="primary-pill">Start a new chat</button>
                    </div>
                </div>
            </div>

            <div id="messages" class="messages"></div>

            <!-- TYPING DOTS -->
            <div id="typingIndicator" class="typing hidden">
                <span></span><span></span><span></span>
            </div>

            <!-- INPUT BOX -->
            <div class="input-bar">
                <textarea id="input" placeholder="Brew a thought and press Enter..." rows="1"></textarea>
                <button id="exportPdfBtn" class="secondary-btn" title="Download this chat as PDF">Download</button>
                <button id="sendBtn" class="send-btn">➤</button>
            </div>
        </main>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
